<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Barbería Alura</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="product.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <script src="javascript/main.js" defer></script>
</head>

<body>
    <header>
        <div class="caja">
            <h1><img src="img/imagenes/logo.png" alt="Logo de la barbería Alura"></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="product.html">Productos</a></li>
                    <li><a href="contact.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h1 class="titulo-productos">Nuestros Productos</h1>
        <div class="producto-grid">
            <div class="producto-card" id="producto-cabello">
                <img src="img/imagenes/cabello.jpg" alt="Corte de Cabello" class="producto-imagen">
                <h2 class="producto-titulo">Cabello</h2>
                <p class="producto-descripción">Con tijera o máquina, a gusto del cliente</p>
                <p class="producto-precio">$10.00</p>
            </div>
            <div class="producto-card" id="producto-barba">
                <img src="img/imagenes/barba.jpg" alt="Corte de Barba" class="producto-imagen">
                <h2 class="producto-titulo">Barba</h2>
                <p class="producto-descripción">Corte y diseño profesional de barba</p>
                <p class="producto-precio">$8.00</p>
            </div>
            <div class="producto-card" id="producto-cabello-barba">
                <img src="img/imagenes/cabello+barba.jpg" alt="Cabello y Barba" class="producto-imagen">
                <h2 class="producto-titulo">Cabello + Barba</h2>
                <p class="producto-descripción">Paquete completo de cabello y barba</p>
                <p class="producto-precio">$15.00</p>
            </div>
        </div>
    </main>
    <footer>
        <img src="img/imagenes/logo-blanco.png" alt="Logo Blanco">
        <p>&copy; Copyright Barbería Alura - 2020</p>
    </footer>
</body>

</html>
